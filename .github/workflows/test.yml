name: Test Suite

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

# Declare default permissions as read only.
permissions: read-all

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    strategy:
      matrix:
        python-version: ["3.11"]

    steps:
    - name: Harden the runner (Audit all outbound calls)
      uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
      with:
        egress-policy: audit

    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest pytest-timeout sentence-transformers numpy watchdog anthropic prompt_toolkit rich datasets einops tree-sitter tree-sitter-java tree-sitter-python tree-sitter-go tree-sitter-rust tree-sitter-javascript tree-sitter-typescript

    - name: Run unit tests
      run: |
        # Run editor tests first (before MockManager patches Path)
        python -m pytest tests/unit/test_editor.py -q --timeout=60
        # Run config tests (before MockManager patches Path)
        python -m pytest tests/unit/test_config.py -q --timeout=60
        # Run remaining unit tests
        python -m pytest tests/unit/ --ignore=tests/unit/test_editor.py --ignore=tests/unit/test_config.py -q --timeout=120 -x

    - name: Run analytical benchmark
      run: |
        python tests/benchmarks/benchmark.py --json > tests/baseline_token_stats_new.json
        python tests/linting/check_regression.py tokens tests/fixtures/baseline_token_stats.json tests/baseline_token_stats_new.json

    - name: Run retrieval benchmark (offline fixture)
      run: |
        python tests/benchmarks/benchmark_retrieval.py --fixture tests/fixtures/retrieval_cases.json --output tests/baseline_retrieval_stats_new.json
        python tests/linting/check_regression.py retrieval tests/fixtures/baseline_retrieval_stats.json tests/baseline_retrieval_stats_new.json
