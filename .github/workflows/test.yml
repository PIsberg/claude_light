name: Test Suite

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    strategy:
      matrix:
        python-version: ["3.11"]

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install sentence-transformers numpy watchdog anthropic prompt_toolkit rich datasets einops tree-sitter tree-sitter-java tree-sitter-python tree-sitter-go tree-sitter-rust tree-sitter-javascript tree-sitter-typescript
        
    - name: Run unit tests
      run: |
        python -m unittest discover -v tests/
        
    - name: Run analytical benchmark
      run: |
        python tests/benchmark.py --json > tests/baseline_token_stats_new.json
        python tests/check_regression.py tokens tests/baseline_token_stats.json tests/baseline_token_stats_new.json
        
    - name: Run retrieval benchmark (subset)
      run: |
        # Limiting to a small repo (marshmallow) so the pipeline uses MiniLM and completes rapidly
        python tests/benchmark_retrieval.py --repo marshmallow-code/marshmallow --json > tests/baseline_retrieval_stats_new.json
        python tests/check_regression.py retrieval tests/baseline_retrieval_stats.json tests/baseline_retrieval_stats_new.json
